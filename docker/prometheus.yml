# =============================================================================
# Islamic School ERP - Prometheus Configuration
# =============================================================================
# Metrics collection, alerting rules, and scrape configurations.
# =============================================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

  # External labels applied to every time series
  external_labels:
    environment: ${PROMETHEUS_ENV:-production}
    project: erp-school
    region: ${PROMETHEUS_REGION:-id-jkt}

# -------- Alertmanager integration (uncomment and configure) --------
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# -------- Rule files containing alerting/recording rules --------
rule_files:
  - /etc/prometheus/alerts/*.yml

# -------- Scrape configurations --------
scrape_configs:

  # ---- Prometheus self-monitoring ----
  - job_name: prometheus
    metrics_path: /metrics
    static_configs:
      - targets:
          - localhost:9090
        labels:
          service: prometheus

  # ---- Backend API (Go / Gin) ----
  - job_name: backend
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - backend:8080
        labels:
          service: erp-backend
          component: api

  # ---- Frontend (Nuxt) ----
  - job_name: frontend
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - frontend:3000
        labels:
          service: erp-frontend
          component: ssr

  # ---- AI Gateway ----
  - job_name: ai-gateway
    metrics_path: /metrics
    scrape_interval: 15s
    static_configs:
      - targets:
          - ai-gateway:8081
        labels:
          service: erp-ai-gateway
          component: ai

  # ---- PostgreSQL (requires postgres_exporter) ----
  # Uncomment when postgres_exporter is deployed
  # - job_name: postgresql
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets:
  #         - postgres-exporter:9187
  #       labels:
  #         service: postgresql
  #         component: database

  # ---- Redis (requires redis_exporter) ----
  # - job_name: redis
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets:
  #         - redis-exporter:9121
  #       labels:
  #         service: redis
  #         component: cache

  # ---- MinIO ----
  - job_name: minio
    metrics_path: /minio/v2/metrics/cluster
    scheme: http
    static_configs:
      - targets:
          - minio:9000
        labels:
          service: minio
          component: object-storage

  # ---- Qdrant ----
  - job_name: qdrant
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - qdrant:6333
        labels:
          service: qdrant
          component: vector-database

  # ---- Nginx (requires nginx-prometheus-exporter or stub_status) ----
  # - job_name: nginx
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets:
  #         - nginx-exporter:9113
  #       labels:
  #         service: nginx
  #         component: reverse-proxy

  # ---- Ollama (optional) ----
  - job_name: ollama
    metrics_path: /metrics
    scheme: http
    scrape_interval: 30s
    static_configs:
      - targets:
          - ollama:11434
        labels:
          service: ollama
          component: ai-model-server
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: ollama_.*
        action: keep

  # ---- Jaeger (OTEL internal metrics) ----
  - job_name: jaeger
    metrics_path: /metrics
    static_configs:
      - targets:
          - jaeger:14269
        labels:
          service: jaeger
          component: tracing

  # ---- Node Exporter (host-level metrics) ----
  # Install node_exporter on each host and add targets:
  # - job_name: node
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets:
  #         - host-node-exporter:9100
  #       labels:
  #         node: docker-host

