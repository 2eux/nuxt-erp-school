# =============================================================================
# Islamic School ERP - Nginx Reverse Proxy Configuration
# =============================================================================
# Handles SSL termination, reverse proxying to backend/frontend/ai-gateway,
# rate limiting, CORS, security headers, WebSocket support, and gzip.
# =============================================================================

# -------- Worker & connection tuning --------
worker_processes auto;
worker_rlimit_nofile 65535;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# -------- Events --------
events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

# -------- HTTP Context --------
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # -------- Logging (JSON format for structured log ingestion) --------
    log_format json_combined escape=json '{'
        '"time_local":"$time_local",'
        '"remote_addr":"$remote_addr",'
        '"remote_user":"$remote_user",'
        '"request":"$request",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"host":"$host",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time",'
        '"request_id":"$request_id"'
    '}';

    access_log /var/log/nginx/access.log json_combined buffer=16k;

    # -------- Performance --------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    client_body_timeout 30;
    client_header_timeout 30;
    send_timeout 30;
    reset_timedout_connection on;

    types_hash_max_size 2048;
    server_names_hash_bucket_size 128;

    # -------- Gzip Compression --------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/x-javascript
        application/xhtml+xml
        application/x-font-ttf
        application/x-font-opentype
        application/vnd.ms-fontobject
        image/svg+xml
        image/x-icon
        font/ttf
        font/opentype;
    gzip_disable "msie6";

    # -------- Client size limits --------
    client_max_body_size 50M;
    client_body_buffer_size 128k;
    large_client_header_buffers 4 16k;

    # -------- Rate Limiting Zones --------
    # General API rate limit: 100 req/s per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # Login endpoint: 5 req/min per IP (brute force protection)
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;

    # AI Gateway: 30 req/min per IP
    limit_req_zone $binary_remote_addr zone=ai_limit:10m rate=30r/m;

    # Connection limit: 20 connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -------- Upstream Definitions --------
    # Backend API (Go server)
    upstream backend_api {
        least_conn;
        server backend:8080 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_timeout 60s;
        keepalive_requests 1000;
    }

    # Frontend (Nuxt SSR server)
    upstream frontend_app {
        least_conn;
        server frontend:3000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # AI Gateway
    upstream ai_gateway {
        least_conn;
        server ai-gateway:8081 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    # -------- Proxy cache (for static assets) --------
    proxy_cache_path /tmp/nginx_cache levels=1:2 keys_zone=static_cache:10m max_size=256m inactive=60m use_temp_path=off;
    proxy_cache_key "$scheme$request_method$host$request_uri";

    # -------- Variables for request tracing --------
    map $http_x_request_id $request_id {
        default $http_x_request_id;
        ""      $request_id;
    }

    # -------- Real IP from Cloudflare / CDN --------
    # Uncomment if behind Cloudflare
    # set_real_ip_from 173.245.48.0/20;
    # set_real_ip_from 103.21.244.0/22;
    # real_ip_header CF-Connecting-IP;

    # =====================================================================
    # HTTP → HTTPS Redirect Server
    # =====================================================================
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # Rate limit all HTTP traffic
        limit_req zone=api_limit burst=20 nodelay;
        limit_conn conn_limit 20;

        return 301 https://$host$request_uri;
    }

    # =====================================================================
    # HTTPS Server - Main Application
    # =====================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ${DOMAIN:-erp-school.id} api.${DOMAIN:-erp-school.id} ai.${DOMAIN:-erp-school.id};

        # -------- SSL Configuration --------
        # Use Let's Encrypt certificates (certbot) or self-signed for dev
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        # Modern SSL settings (Mozilla Intermediate profile)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_ecdh_curve X25519:secp384r1:secp256r1;

        # OCSP Stapling (improves TLS handshake performance)
        ssl_stapling on;
        ssl_stapling_verify on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_session_tickets off;

        # Resolver for OCSP
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # -------- Security Headers --------
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;

        # Content-Security-Policy (CSP) - adjust for your analytics/pixel domains
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://api.${DOMAIN:-erp-school.id} https://ai.${DOMAIN:-erp-school.id} wss://${DOMAIN:-erp-school.id}; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none';" always;

        # HTTP Strict Transport Security (HSTS) - 2 year max-age
        # Remove 'includeSubDomains' if subdomains don't support HTTPS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Remove server tokens
        server_tokens off;
        proxy_hide_header X-Powered-By;

        # -------- Root (redirect to frontend) --------
        location = / {
            return 301 /app/;
        }

        # ===================================================================
        # Frontend Application (Nuxt 4 SSR)
        # ===================================================================
        location /app/ {
            rewrite ^/app/(.*) /$1 break;
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;

            # Rate limiting
            limit_req zone=api_limit burst=30 nodelay;
            limit_conn conn_limit 20;

            # Headers for Nuxt SSR
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;

            # WebSocket support for HMR (dev) and real-time features
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # Timeouts for SSR
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 10s;

            # Cache static responses from Nuxt
            proxy_cache static_cache;
            proxy_cache_valid 200 5m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status;
        }

        # ===================================================================
        # Backend API
        # ===================================================================
        location /api/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;

            # Rate limiting
            limit_req zone=api_limit burst=50 nodelay;
            limit_conn conn_limit 20;

            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            # Disable buffering for streaming responses (SSE, file download)
            proxy_buffering off;
            proxy_request_buffering off;

            # Timeouts for long-running API requests
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
            proxy_connect_timeout 10s;

            # Don't cache API responses (they're dynamic)
            proxy_no_cache 1;
            proxy_cache_bypass 1;

            # CORS for API (handled by Go backend, but add as fallback)
            add_header Access-Control-Allow-Origin "https://${DOMAIN:-erp-school.id}" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Request-ID, Accept-Language, X-School-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Max-Age 86400 always;

            # Handle OPTIONS preflight
            if ($request_method = 'OPTIONS') {
                add_header Content-Type "text/plain charset=UTF-8";
                add_header Content-Length 0;
                return 204;
            }
        }

        # ===================================================================
        # Auth endpoints - stricter rate limiting (brute force protection)
        # ===================================================================
        location /api/v1/auth/ {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;

            limit_req zone=login_limit burst=3 nodelay;
            limit_conn conn_limit 10;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
            proxy_connect_timeout 10s;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # ===================================================================
        # AI Gateway
        # ===================================================================
        location /ai/ {
            proxy_pass http://ai_gateway;
            proxy_http_version 1.1;

            limit_req zone=ai_limit burst=10 nodelay;
            limit_conn conn_limit 10;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            proxy_set_header Connection "";

            # Longer timeouts for AI requests (LLM generation)
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;

            # Support SSE streaming for AI responses
            proxy_buffering off;
            chunked_transfer_encoding on;

            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }

        # ===================================================================
        # MinIO Console (admin only - restrict by IP in production)
        # ===================================================================
        location /minio/ {
            # In production, add IP whitelist or basic auth:
            # allow 10.0.0.0/8;
            # allow 172.16.0.0/12;
            # deny all;

            proxy_pass http://minio:9001/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 300s;
        }

        # ===================================================================
        # Static assets (served directly by Nginx for performance)
        # ===================================================================
        location /static/ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            add_header Vary "Accept-Encoding";

            # Static files don't need rate limiting
            limit_req off;
            limit_conn off;

            try_files $uri =404;
        }

        location /_nuxt/ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
            limit_req off;
            limit_conn off;
            try_files $uri =404;
        }

        # ===================================================================
        # Health Check Endpoint (for load balancers / monitoring)
        # ===================================================================
        location /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # ===================================================================
        # Deny access to hidden files
        # ===================================================================
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }

        # ===================================================================
        # Favicon / robots.txt
        # ===================================================================
        location = /favicon.ico {
            log_not_found off;
            access_log off;
            expires 30d;
        }

        location = /robots.txt {
            log_not_found off;
            access_log off;
        }
    }

    # =====================================================================
    # HTTPS Server - Monitoring Subdomain (Grafana, Prometheus)
    # =====================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name monitoring.${DOMAIN:-erp-school.id};

        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        server_tokens off;

        # IP restriction for monitoring (recommended)
        # allow 10.0.0.0/8;
        # allow YOUR_VPN_IP;
        # deny all;

        location / {
            proxy_pass http://grafana:3000/;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_read_timeout 300s;
        }
    }
}
