name: CI Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - ".github/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.23"
  NODE_VERSION: "22"
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/frontend
  IMAGE_NAME_AI_GATEWAY: ${{ github.repository }}/ai-gateway

jobs:
  # =============================================================================
  # Detect Changes - Determine which components changed
  # =============================================================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-24.04
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ai-gateway: ${{ steps.filter.outputs.ai-gateway }}
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.yml'
              - 'docker/backend.Dockerfile'
            frontend:
              - 'frontend/**'
              - 'docker-compose.yml'
              - 'docker/frontend.Dockerfile'
            ai-gateway:
              - 'ai-gateway/**'
              - 'docker-compose.yml'
              - 'docker/ai-gateway.Dockerfile'
            docker:
              - 'docker/**'

  # =============================================================================
  # Lint - Backend (Go)
  # =============================================================================
  lint-backend:
    name: Lint (Go)
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62
          working-directory: backend
          args: --timeout=10m --config=../.golangci.yml
          skip-cache: false

      - name: go vet
        working-directory: backend
        run: go vet ./...

      - name: gofmt check
        working-directory: backend
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Found unformatted files:"
            gofmt -l .
            exit 1
          fi

  # =============================================================================
  # Lint - Frontend (ESLint + Type Check)
  # =============================================================================
  lint-frontend:
    name: Lint (Frontend)
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: ESLint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run typecheck

  # =============================================================================
  # Test - Backend (Go tests)
  # =============================================================================
  test-backend:
    name: Test (Go)
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    services:
      postgres:
        image: postgres:16.3-alpine
        env:
          POSTGRES_USER: erp_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: erp_school_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Run tests
        working-directory: backend
        run: |
          go test ./... \
            -v \
            -race \
            -coverprofile=coverage.out \
            -covermode=atomic \
            -timeout 10m
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: erp_test
          DB_PASSWORD: test_password
          DB_NAME: erp_school_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage.out
          flags: backend
          fail_ci_if_error: false

  # =============================================================================
  # Test - Frontend (Vitest)
  # =============================================================================
  test-frontend:
    name: Test (Frontend)
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm run test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  # =============================================================================
  # Security Scan - Backend (gosec)
  # =============================================================================
  security-backend:
    name: Security Scan (GoSec)
    runs-on: ubuntu-24.04
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Run Gosec
        uses: securego/gosec@v2.22.0
        with:
          args: -no-fail -fmt sarif -out results.sarif ./backend/...

      - name: Upload SARIF results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: gosec

  # =============================================================================
  # Build - Docker images
  # =============================================================================
  build:
    name: Build & Push
    runs-on: ubuntu-24.04
    needs: [changes, lint-backend, lint-frontend, test-backend, test-frontend, security-backend]
    if: |
      always() &&
      (needs.changes.result == 'success') &&
      (needs.lint-backend.result == 'success' || needs.lint-backend.result == 'skipped') &&
      (needs.lint-frontend.result == 'success' || needs.lint-frontend.result == 'skipped') &&
      (needs.test-backend.result == 'success' || needs.test-backend.result == 'skipped') &&
      (needs.test-frontend.result == 'success' || needs.test-frontend.result == 'skipped') &&
      (needs.security-backend.result == 'success' || needs.security-backend.result == 'skipped')
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Docker meta (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Docker meta (AI Gateway)
        id: meta-ai-gateway
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_AI_GATEWAY }}
          tags: |
            type=sha,prefix=,format=short
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build & Push Backend
      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        if: needs.changes.outputs.backend == 'true'
        with:
          context: ./backend
          file: ./docker/backend.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            GO_VERSION=${{ env.GO_VERSION }}
          provenance: true
          sbom: true

      # Build & Push Frontend
      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        if: needs.changes.outputs.frontend == 'true'
        with:
          context: ./frontend
          file: ./docker/frontend.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            NODE_VERSION=${{ env.NODE_VERSION }}
          provenance: true
          sbom: true

      # Build & Push AI Gateway
      - name: Build & Push AI Gateway
        uses: docker/build-push-action@v6
        if: needs.changes.outputs.ai-gateway == 'true'
        with:
          context: ./ai-gateway
          file: ./docker/ai-gateway.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ai-gateway.outputs.tags }}
          labels: ${{ steps.meta-ai-gateway.outputs.labels }}
          cache-from: type=gha,scope=ai-gateway
          cache-to: type=gha,mode=max,scope=ai-gateway
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            GO_VERSION=${{ env.GO_VERSION }}
          provenance: true
          sbom: true

  # =============================================================================
  # Security Scan - Container Images (Trivy)
  # =============================================================================
  trivy-scan:
    name: Trivy Vulnerability Scan
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Run Trivy on Backend Image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          exit-code: 1
          ignore-unfixed: true

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
          category: trivy-backend
